<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="PKMN">
  <!-- hard-edged shadow -->
  <rect x="4" y="4" width="60" height="60" fill="#000000" />
  <!-- pokeball body -->
  <rect x="2" y="2" width="56" height="56" fill="#ffffff" stroke="#000000" stroke-width="4" />
  <!-- red top half -->
  <rect x="3" y="3" width="53" height="27" fill="#d32f2f" />
  <!-- center divider + button -->
  <rect x="2" y="27" width="56" height="3" fill="#111111" />
  <!-- PKMN initials split over two rows -->
  <text
    text-anchor="start"
    x="6"
    y="24"
    fill="#ffffff"
    font-family="'Ubuntu Mono', monospace"
    font-weight="800"
    font-size="26"
    letter-spacing="1"
  >
    PK
  </text>
  <text
    text-anchor="start"
    x="6"
    y="48"
    fill="#111827"
    font-family="'Ubuntu Mono', monospace"
    font-weight="800"
    font-size="26"
    letter-spacing="1"
  >
    MN
  </text>
</svg>